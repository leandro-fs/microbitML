<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sudoku (4×4 / 6×6 / 9×9)</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:#111c33;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#60a5fa;
      --bad:#fb7185;
      --ok:#34d399;
      --line:#2b3b63;
      --thin: rgba(148,163,184,.14);
      --thick: rgba(226,232,240,.28);
    }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, #0b1020, var(--bg));
      color: var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .app{
      width:min(980px, 100%);
      display:grid;
      gap:16px;
      grid-template-columns: 340px 1fr;
    }
    @media (max-width: 860px){
      .app{ grid-template-columns: 1fr; }
    }
    .card{
      background: rgba(17,28,51,.85);
      border:1px solid rgba(148,163,184,.18);
      border-radius:16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      overflow:hidden;
    }
    .card h2{
      margin:0;
      font-size:16px;
      font-weight:700;
      letter-spacing:.2px;
      padding:14px 16px;
      border-bottom:1px solid rgba(148,163,184,.15);
      background: rgba(255,255,255,.03);
    }
    .controls{
      padding:14px 16px;
      display:grid;
      gap:12px;
    }
    .row{
      display:grid;
      gap:8px;
    }
    label{
      font-size:12px;
      color: var(--muted);
    }
    select, button{
      background: rgba(11,18,34,.9);
      border: 1px solid rgba(148,163,184,.22);
      color: var(--text);
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    select:focus, button:focus{
      border-color: rgba(96,165,250,.6);
      box-shadow: 0 0 0 3px rgba(96,165,250,.18);
    }
    .btns{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:6px;
    }
    button{
      cursor:pointer;
      font-weight:700;
    }
    button.primary{
      background: rgba(96,165,250,.18);
      border-color: rgba(96,165,250,.45);
    }
    button.danger{
      background: rgba(251,113,133,.12);
      border-color: rgba(251,113,133,.35);
    }
    button:active{ transform: translateY(1px); }
    .hint{
      font-size:12px;
      color: var(--muted);
      line-height:1.35;
    }
    .status{
      padding:12px 16px;
      border-top:1px solid rgba(148,163,184,.15);
      font-size:13px;
      color: var(--muted);
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-weight:700;
      color: var(--text);
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background: rgba(148,163,184,.55);
    }
    .dot.ok{ background: rgba(52,211,153,.9); }
    .dot.bad{ background: rgba(251,113,133,.9); }

    /* Board */
    .boardWrap{
      padding:16px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .board{
      display:grid;
      background: rgba(11,18,34,.75);
      border:1px solid rgba(148,163,184,.18);
      border-radius:16px;
      padding:10px;
      gap:0px; /* ahora lo hacemos con bordes, no con gap */
      user-select:none;
    }
    .cell{
      position:relative;
      background: rgba(255,255,255,.03);
      border:1px solid var(--thin);
      display:flex;
      align-items:center;
      justify-content:center;
      transition: .12s ease;
    }
    .cell.fixed{
      background: rgba(96,165,250,.08);
      border-color: rgba(96,165,250,.22);
    }
    .cell.conflict{
      border-color: rgba(251,113,133,.75) !important;
      box-shadow: inset 0 0 0 2px rgba(251,113,133,.20);
    }
    .cell.wrong{
      background: rgba(251,113,133,.10);
    }
    .cell.correct{
      background: rgba(52,211,153,.07);
    }
    .cell .inp{
      width:100%;
      height:100%;
      border:none;
      outline:none;
      background: transparent;
      color: var(--text);
      text-align:center;
      font-weight:800;
      font-size: 18px;
      caret-color: var(--accent);
    }
    .cell.fixed .inp{
      color: rgba(229,231,235,.95);
    }
    .cell:not(.fixed) .inp{
      color: rgba(226,232,240,.95);
    }
    .cell .inp::placeholder{ color: rgba(148,163,184,.35); }

    .footerNote{
      padding:0 16px 14px 16px;
      color: var(--muted);
      font-size:12px;
      line-height:1.35;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h2>Configuración</h2>
      <div class="controls">
        <div class="row">
          <label for="sizeSel">Tamaño</label>
          <select id="sizeSel">
            <option value="4">4×4 (cajas 2×2)</option>
            <option value="6">6×6 (cajas 2×3)</option>
            <option value="9" selected>9×9 (cajas 3×3)</option>
          </select>
        </div>

        <div class="row">
          <label for="diffSel">Dificultad</label>
          <select id="diffSel">
            <option value="easy">Fácil</option>
            <option value="medium" selected>Media</option>
            <option value="hard">Difícil</option>
            <option value="expert">Experto</option>
          </select>
        </div>

        <div class="btns">
          <button class="primary" id="newBtn">Nuevo juego</button>
          <button id="clearBtn">Limpiar marcas</button>
          <button class="danger" id="solveBtn">Resolver</button>
        </div>

        <div class="hint">
          - Verificación <b>automática</b> al escribir (conflictos y valores incorrectos).<br/>
          - 6×6 usa cajas <b>2×3</b>.
        </div>
      </div>
      <div class="status">
        <span class="badge"><span id="dot" class="dot"></span><span id="msg">Listo.</span></span>
        <span id="meta"></span>
      </div>
    </div>

    <div class="card">
      <h2>Sudoku</h2>
      <div class="boardWrap">
        <div id="board" class="board" aria-label="Tablero Sudoku"></div>
      </div>
      <div class="footerNote">
        Tip: teclado numérico. Se rechazan valores fuera del rango (ej. en 6×6 solo 1..6).
      </div>
    </div>
  </div>

<script>
function cfgForSize(size){
  if(size === 4) return { size, boxRows:2, boxCols:2 };
  if(size === 6) return { size, boxRows:2, boxCols:3 };
  if(size === 9) return { size, boxRows:3, boxCols:3 };
  
  throw new Error("size no soportado");
}

function emptiesFor(size, diff){
  const map = {
    4: { easy: 4,  medium: 6,  hard: 7,  expert: 8 },
    6: { easy: 10, medium: 14, hard: 18, expert: 20 },
    9: { easy: 40, medium: 48, hard: 54, expert: 58 },
  };
  return map[size][diff];
}

function makeEmptyBoard(N){ return Array.from({length:N}, ()=>Array(N).fill(0)); }
function cloneBoard(b){ return b.map(r => r.slice()); }
function idx(r,c,N){ return r*N + c; }

function makeUnits(N, boxRows, boxCols){
  const units = [];

  for(let r=0;r<N;r++){
    const u=[]; for(let c=0;c<N;c++) u.push(idx(r,c,N));
    units.push(u);
  }
  for(let c=0;c<N;c++){
    const u=[]; for(let r=0;r<N;r++) u.push(idx(r,c,N));
    units.push(u);
  }
  for(let br=0;br<N;br+=boxRows){
    for(let bc=0;bc<N;bc+=boxCols){
      const u=[];
      for(let r=0;r<boxRows;r++){
        for(let c=0;c<boxCols;c++){
          u.push(idx(br+r, bc+c, N));
        }
      }
      units.push(u);
    }
  }

  const peers = Array.from({length:N*N}, ()=> new Set());
  for(const u of units){
    for(const a of u){
      for(const b of u){
        if(a!==b) peers[a].add(b);
      }
    }
  }
  return { units, peers: peers.map(s => Array.from(s)) };
}

function popcount(x){ let c=0; while(x){ x &= (x-1); c++; } return c; }

function computeMask(board, N, peers, cell){
  const r = Math.floor(cell / N);
  const c = cell % N;
  if(board[r][c] !== 0) return 0;

  let used = 0;
  for(const p of peers[cell]){
    const pr = Math.floor(p / N);
    const pc = p % N;
    const v = board[pr][pc];
    if(v) used |= (1 << v);
  }
  let mask = 0;
  for(let v=1; v<=N; v++){
    if((used & (1<<v)) === 0) mask |= (1<<v);
  }
  return mask;
}

function maskToValues(mask, N){
  const out = [];
  for(let v=1; v<=N; v++) if(mask & (1<<v)) out.push(v);
  return out;
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = (Math.random() * (i+1)) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickMRV(board, N, peers){
  let bestCell = -1, bestMask = 0, bestCount = 999;

  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      if(board[r][c] === 0){
        const cell = idx(r,c,N);
        const mask = computeMask(board, N, peers, cell);
        const count = popcount(mask);
        if(count === 0) return { cell: -2, mask: 0 }; // dead end
        if(count < bestCount){
          bestCount = count;
          bestCell = cell;
          bestMask = mask;
          if(count === 1) return { cell: bestCell, mask: bestMask };
        }
      }
    }
  }
  return { cell: bestCell, mask: bestMask };
}

function solveBacktracking(board, N, peers){
  const pick = pickMRV(board, N, peers);

  if(pick.cell === -1){
    const anyEmpty = board.some(row => row.some(v => v===0));
    return !anyEmpty;
  }
  if(pick.cell === -2) return false;

  const r = Math.floor(pick.cell / N);
  const c = pick.cell % N;
  const vals = shuffle(maskToValues(pick.mask, N));

  for(const v of vals){
    board[r][c] = v;
    if(solveBacktracking(board, N, peers)) return true;
    board[r][c] = 0;
  }
  return false;
}

function countSolutions(board, N, peers, limit=2){
  let count = 0;

  function dfs(){
    if(count >= limit) return;
    const pick = pickMRV(board, N, peers);

    if(pick.cell === -1){
      const anyEmpty = board.some(row => row.some(v => v===0));
      if(!anyEmpty) count++;
      return;
    }
    if(pick.cell === -2) return;

    const r = Math.floor(pick.cell / N);
    const c = pick.cell % N;
    const vals = maskToValues(pick.mask, N);

    for(const v of vals){
      board[r][c] = v;
      dfs();
      board[r][c] = 0;
      if(count >= limit) return;
    }
  }

  dfs();
  return count;
}

function generateFullSolution(N, boxRows, boxCols){
  const { peers } = makeUnits(N, boxRows, boxCols);
  const b = makeEmptyBoard(N);
  solveBacktracking(b, N, peers);
  return b;
}

function generatePuzzle(N, boxRows, boxCols, emptyCount){
  const { peers } = makeUnits(N, boxRows, boxCols);

  const solution = generateFullSolution(N, boxRows, boxCols);
  const puzzle = cloneBoard(solution);

  const cells = [];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) cells.push(idx(r,c,N));
  shuffle(cells);

  let removed = 0;
  for(const cell of cells){
    if(removed >= emptyCount) break;
    const r = Math.floor(cell / N);
    const c = cell % N;
    const backup = puzzle[r][c];
    if(backup === 0) continue;

    puzzle[r][c] = 0;
    const test = cloneBoard(puzzle);
    const nsol = countSolutions(test, N, peers, 2);

    if(nsol !== 1){
      puzzle[r][c] = backup;
    }else{
      removed++;
    }
  }

  if(removed < emptyCount){
    return generatePuzzle(N, boxRows, boxCols, emptyCount);
  }

  return { puzzle, solution };
}

/* ============== UI ============== */

const sizeSel = document.getElementById("sizeSel");
const diffSel = document.getElementById("diffSel");
const newBtn  = document.getElementById("newBtn");
const clearBtn= document.getElementById("clearBtn");
const solveBtn= document.getElementById("solveBtn");
const boardEl = document.getElementById("board");
const msgEl   = document.getElementById("msg");
const dotEl   = document.getElementById("dot");
const metaEl  = document.getElementById("meta");

let current = {
  N: 9, boxRows: 3, boxCols: 3,
  puzzle: null, solution: null, fixed: null
};

function setStatus(text, kind="neutral", meta=""){
  msgEl.textContent = text;
  metaEl.textContent = meta;
  dotEl.className = "dot" + (kind==="ok" ? " ok" : kind==="bad" ? " bad" : "");
}

function buildBoardUI(N){
  boardEl.innerHTML = "";
  const cellSize = N === 9 ? 52 : (N === 6 ? 62 : 72);
  boardEl.style.gridTemplateColumns = `repeat(${N}, ${cellSize}px)`;
  boardEl.style.gridTemplateRows    = `repeat(${N}, ${cellSize}px)`;

  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const cell = document.createElement("div");
      cell.className = "cell";

      // BORDES GRUESOS PARA SUBCUADRÍCULAS
      // top border thick when starting a box row
      if(r % current.boxRows === 0) cell.style.borderTopColor = "var(--thick)";
      // left border thick when starting a box col
      if(c % current.boxCols === 0) cell.style.borderLeftColor = "var(--thick)";
      // bottom/right for outer edges
      if(r === N-1) cell.style.borderBottomColor = "var(--thick)";
      if(c === N-1) cell.style.borderRightColor = "var(--thick)";

      // también hacemos el grosor, no solo color
      const topW = (r % current.boxRows === 0) ? 2 : 1;
      const leftW = (c % current.boxCols === 0) ? 2 : 1;
      const bottomW = (r === N-1) ? 2 : 1;
      const rightW = (c === N-1) ? 2 : 1;
      cell.style.borderTopWidth = topW + "px";
      cell.style.borderLeftWidth = leftW + "px";
      cell.style.borderBottomWidth = bottomW + "px";
      cell.style.borderRightWidth = rightW + "px";

      const inp = document.createElement("input");
      inp.className = "inp";
      inp.inputMode = "numeric";
      inp.maxLength = 2;
      inp.dataset.r = r;
      inp.dataset.c = c;

      inp.addEventListener("input", (e)=>{
        const rr = +e.target.dataset.r;
        const cc = +e.target.dataset.c;

        let v = e.target.value.replace(/[^\d]/g,"");
        if(v === ""){
          e.target.value = "";
        }else{
          let num = parseInt(v, 10);
          if(Number.isNaN(num)) num = 0;
          if(num < 1 || num > current.N){
            e.target.value = "";
          }else{
            e.target.value = String(num);
          }
        }

        autoValidate(); // ✅ verificación automática
      });

      inp.addEventListener("keydown", (e)=>{
        if(e.key === "0") e.preventDefault();
      });

      cell.appendChild(inp);
      boardEl.appendChild(cell);
    }
  }
}

function renderPuzzle(){
  const N = current.N;
  current.fixed = Array.from({length:N}, ()=>Array(N).fill(false));

  buildBoardUI(N);

  const children = boardEl.children;
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const v = current.puzzle[r][c];
      const cellIndex = r*N + c;
      const cell = children[cellIndex];
      const inp = cell.querySelector("input");

      cell.classList.remove("fixed","conflict","wrong","correct");

      if(v !== 0){
        inp.value = String(v);
        inp.disabled = true;
        cell.classList.add("fixed");
        current.fixed[r][c] = true;
      }else{
        inp.value = "";
        inp.disabled = false;
        current.fixed[r][c] = false;
      }
    }
  }

  setStatus("Listo. ¡A jugar!", "ok");
}

function readUserBoard(){
  const N = current.N;
  const b = makeEmptyBoard(N);
  const children = boardEl.children;
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const cell = children[r*N + c];
      const inp = cell.querySelector("input");
      const v = inp.value.trim();
      b[r][c] = v ? parseInt(v,10) : 0;
    }
  }
  return b;
}

function clearMarks(){
  for(const cell of boardEl.querySelectorAll(".cell.conflict,.cell.wrong,.cell.correct")){
    cell.classList.remove("conflict","wrong","correct");
  }
}

function makePeersForCurrent(){
  return makeUnits(current.N, current.boxRows, current.boxCols).peers;
}

function findConflicts(board, peers){
  const N = current.N;
  const conflicts = new Set();

  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const v = board[r][c];
      if(!v) continue;
      const cell = idx(r,c,N);
      for(const p of peers[cell]){
        const pr = Math.floor(p / N);
        const pc = p % N;
        if(board[pr][pc] === v){
          conflicts.add(cell);
          conflicts.add(p);
        }
      }
    }
  }
  return Array.from(conflicts);
}

function autoValidate(){
  clearMarks();

  const N = current.N;
  const peers = makePeersForCurrent();
  const user = readUserBoard();
  const children = boardEl.children;

  // 1) conflictos (repetidos)
  const conflicts = findConflicts(user, peers);
  for(const ci of conflicts){
    children[ci].classList.add("conflict");
  }

  // 2) incorrectos vs solución (solo si no hay conflicto en esa celda)
  let wrong = 0, filled = 0;
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      if(current.fixed[r][c]) continue; // no marcar givens
      const v = user[r][c];
      if(!v) continue;

      filled++;
      const cellIndex = r*N + c;
      const cell = children[cellIndex];

      if(cell.classList.contains("conflict")) continue;

      if(v !== current.solution[r][c]){
        wrong++;
        cell.classList.add("wrong");
      }else{
        cell.classList.add("correct");
      }
    }
  }

  // status
  if(conflicts.length){
    setStatus("Conflictos: hay números repetidos en una fila/col/caja.", "bad", `completadas: ${filled}/${N*N}`);
    return;
  }
  if(wrong){
    setStatus(`Hay ${wrong} valor(es) incorrecto(s).`, "bad", `completadas: ${filled}/${N*N}`);
    return;
  }

  // ¿completo?
  const totalFilled = user.flat().filter(v=>v!==0).length;
  if(totalFilled === N*N){
    setStatus("¡Perfecto! Sudoku completado.", "ok");
  }else{
    setStatus("Sin errores hasta ahora.", "ok", `completadas: ${totalFilled}/${N*N}`);
  }
}

function newGame(){
  const N = parseInt(sizeSel.value, 10);
  const diff = diffSel.value;
  const cfg = cfgForSize(N);
  const empties = emptiesFor(N, diff);

  current.N = cfg.size;
  current.boxRows = cfg.boxRows;
  current.boxCols = cfg.boxCols;

  setStatus("Generando…", "neutral", `${N}×${N} · ${diff} · vacíos=${empties}`);

  setTimeout(()=>{
    const t0 = performance.now();
    const { puzzle, solution } = generatePuzzle(cfg.size, cfg.boxRows, cfg.boxCols, empties);
    const t1 = performance.now();

    current.puzzle = puzzle;
    current.solution = solution;

    renderPuzzle();
    setStatus("Listo. ¡A jugar!", "ok", `${N}×${N} · ${diff} · vacíos=${empties} · ${(t1-t0).toFixed(0)}ms`);
    autoValidate();
  }, 10);
}

function solveUI(){
  clearMarks();
  const N = current.N;
  const children = boardEl.children;
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const cell = children[r*N + c];
      const inp = cell.querySelector("input");
      inp.value = String(current.solution[r][c]);
      inp.disabled = true;
      cell.classList.add("fixed");
    }
  }
  setStatus("Resuelto (mostrando solución).", "neutral");
}

newBtn.addEventListener("click", newGame);
clearBtn.addEventListener("click", ()=>{
  clearMarks();
  setStatus("Marcas limpiadas.", "neutral");
});
solveBtn.addEventListener("click", solveUI);

// inicial
newGame();
</script>
</body>
</html>
